provider: aws-bedrock
region: us-east-1

# The Model Gateway selects models by capability. Replace model_id values as needed.
models:
  reasoning:
    model_id: anthropic.claude-3-5-sonnet-20240620
  fast:
    model_id: anthropic.claude-3-haiku-20240307
  embedding:
    model_id: amazon.titan-embed-text-v1

# Optional: agent orchestration
agent_orchestration:
  enabled: false
  provider: bedrock-agent-core
  strands_enabled: false
